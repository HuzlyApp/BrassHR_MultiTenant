name: Supabase migrations → staging (South)

# When migration files land on main (or develop/staging), push schema to
# BrassHR_South (staging) only. Never touches production.
# Secrets: DEVELOPMENT_* or STAGING_* (aliases).

on:
  push:
    branches: [main, develop, staging]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
  workflow_dispatch:

concurrency:
  group: supabase-migrate-development
  cancel-in-progress: false

jobs:
  migrate-development:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD || secrets.DEVELOPMENT_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.STAGING_PROJECT_ID || secrets.DEVELOPMENT_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Require GitHub secrets
        run: |
          missing=0
          for v in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_ID; do
            if [ -z "${!v}" ]; then
              echo "Missing secret/env: $v"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Add secrets documented in docs/supabase-environments.md"
            exit 1
          fi

      - name: Guard target is BrassHR_South (staging)
        run: |
          echo "Target project: $SUPABASE_PROJECT_ID"
          if [ "$SUPABASE_PROJECT_ID" = "avhdoifnsnoeavqxnwwm" ]; then
            echo "Refusing: staging workflow must never target production."
            exit 1
          fi
          if [ "$SUPABASE_PROJECT_ID" != "mgucromvpnxntwyssltd" ]; then
            echo "Unexpected staging project id. Expected mgucromvpnxntwyssltd."
            exit 1
          fi

      - name: Link staging project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Show migration status before push
        run: supabase migration list

      - name: Push migrations to staging
        run: supabase db push --include-all --yes
      - name: Show migration status after push
        run: supabase migration list
