name: Supabase prod → staging sync checks

# One-way only: BrassHR (prod) → BrassHR_South (staging).
# Compares schema / RLS / reports drift. Never copies PII rows or Storage objects.
#
# Triggers:
# - After migration merges (push to main/develop/staging)
# - Daily schema-drift comparison
# - Manual dispatch (optional catch-up + reference-data dry-run)

on:
  schedule:
    # Daily 06:00 UTC
    - cron: "0 6 * * *"
  push:
    branches: [main, develop, staging]
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - "scripts/supabase-sync/**"
      - "scripts/supabase-check-drift.mjs"
      - "scripts/supabase-verify-*.mjs"
  workflow_dispatch:
    inputs:
      apply_migrations_to_staging:
        description: "Push repo migrations to staging (South) after checks"
        required: false
        default: false
        type: boolean
      reference_data_dry_run:
        description: "Dry-run allowlisted reference-data sync plan"
        required: false
        default: true
        type: boolean

concurrency:
  group: supabase-prod-to-staging-sync
  cancel-in-progress: false

jobs:
  sync-checks:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PRODUCTION_PROJECT_ID: ${{ secrets.PRODUCTION_PROJECT_ID }}
      PRODUCTION_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
      STAGING_PROJECT_ID: ${{ secrets.STAGING_PROJECT_ID || secrets.DEVELOPMENT_PROJECT_ID }}
      STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD || secrets.DEVELOPMENT_DB_PASSWORD }}
      DEVELOPMENT_PROJECT_ID: ${{ secrets.DEVELOPMENT_PROJECT_ID }}
      DEVELOPMENT_DB_PASSWORD: ${{ secrets.DEVELOPMENT_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Guard direction (prod → staging)
        run: |
          PROD="${PRODUCTION_PROJECT_ID:-avhdoifnsnoeavqxnwwm}"
          STAGING="${STAGING_PROJECT_ID:-${DEVELOPMENT_PROJECT_ID:-mgucromvpnxntwyssltd}}"
          test "$PROD" = "avhdoifnsnoeavqxnwwm"
          test "$STAGING" = "mgucromvpnxntwyssltd"
          test "$PROD" != "$STAGING"
          echo "Direction OK: $PROD → $STAGING"

      - name: Unit tests (sync guards)
        run: npm test -- lib/supabase/prod-to-staging-sync.test.ts

      - name: Schema drift (check-drift)
        id: drift
        continue-on-error: true
        run: npm run supabase:check-drift

      - name: RLS compare (when dumps present)
        id: rls
        continue-on-error: true
        run: npm run supabase:verify-rls

      - name: Upload dumps and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-to-staging-sync-reports
          path: |
            schema-prod-public.sql
            schema-staging-public.sql
            reports/
          if-no-files-found: ignore

      - name: Summarize
        if: always()
        run: |
          echo "## Prod → staging sync" >> "$GITHUB_STEP_SUMMARY"
          echo "- Schema drift step: ${{ steps.drift.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- RLS step: ${{ steps.rls.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Direction: production → staging only (no PII / Auth / Storage objects)" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.drift.outcome }}" != "success" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Drift detected. Commit forward-only migrations; do not dump-restore destructively." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Push migrations to staging (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply_migrations_to_staging == true }}
        env:
          SUPABASE_DB_PASSWORD: ${{ env.STAGING_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ env.STAGING_PROJECT_ID || env.DEVELOPMENT_PROJECT_ID }}
        run: |
          test "$SUPABASE_PROJECT_ID" = "mgucromvpnxntwyssltd"
          test "$SUPABASE_PROJECT_ID" != "avhdoifnsnoeavqxnwwm"
          supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"
          supabase db push --include-all --yes

      - name: Reference-data sync dry-run (optional)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.reference_data_dry_run == true }}
        continue-on-error: true
        env:
          PRODUCTION_SERVICE_ROLE_KEY: ${{ secrets.PRODUCTION_SERVICE_ROLE_KEY }}
          STAGING_SERVICE_ROLE_KEY: ${{ secrets.STAGING_SERVICE_ROLE_KEY || secrets.DEVELOPMENT_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$PRODUCTION_SERVICE_ROLE_KEY" ] || [ -z "$STAGING_SERVICE_ROLE_KEY" ]; then
            echo "Skip: PRODUCTION_SERVICE_ROLE_KEY / STAGING_SERVICE_ROLE_KEY not set"
            exit 0
          fi
          npm run supabase:sync-reference-data

      - name: Fail when schema drift exists
        if: steps.drift.outcome != 'success'
        run: exit 1
