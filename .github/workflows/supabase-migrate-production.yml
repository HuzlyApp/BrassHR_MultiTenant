name: Supabase migrations → production (manual)

# Manual only — never auto-deploy schema to production.
# Type the production project ref to confirm.

on:
  workflow_dispatch:
    inputs:
      confirm_project_ref:
        description: "Type the production project ref to confirm (avhdoifnsnoeavqxnwwm)"
        required: true
        type: string

concurrency:
  group: supabase-migrate-production
  cancel-in-progress: false

jobs:
  migrate-production:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.PRODUCTION_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Confirm production project ref
        run: |
          echo "Secret PRODUCTION_PROJECT_ID=$SUPABASE_PROJECT_ID"
          echo "Typed confirmation=${{ inputs.confirm_project_ref }}"
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PASSWORD" ] || [ -z "$SUPABASE_PROJECT_ID" ]; then
            echo "Missing PRODUCTION secrets. See docs/supabase-environments.md"
            exit 1
          fi
          if [ "$SUPABASE_PROJECT_ID" != "avhdoifnsnoeavqxnwwm" ]; then
            echo "PRODUCTION_PROJECT_ID secret must be avhdoifnsnoeavqxnwwm"
            exit 1
          fi
          if [ "${{ inputs.confirm_project_ref }}" != "avhdoifnsnoeavqxnwwm" ]; then
            echo "Confirmation string does not match production ref. Aborting."
            exit 1
          fi

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Show migration status before push
        run: supabase migration list

      - name: Push migrations to production
        run: supabase db push --yes

      - name: Show migration status after push
        run: supabase migration list
